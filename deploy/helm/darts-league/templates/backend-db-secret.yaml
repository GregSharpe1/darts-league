{{- if and (not .Values.postgres.enabled) (not .Values.externalDatabase.existingSecret) }}
{{- if not .Values.externalDatabase.host }}
{{- fail "externalDatabase.host must be set when postgres.enabled=false and externalDatabase.existingSecret is empty" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "darts-league.backendDatabaseSecretName" . }}
  labels:
    {{- include "darts-league.backendLabels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "darts-league.databaseUrl" . | quote }}
{{- end }}
