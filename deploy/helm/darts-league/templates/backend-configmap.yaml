apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "darts-league.backendName" . }}
  labels:
    {{- include "darts-league.backendLabels" . | nindent 4 }}
data:
  HTTP_ADDRESS: {{ .Values.backend.env.httpAddress | quote }}
  APP_TIMEZONE: {{ .Values.backend.env.appTimezone | quote }}
  SLACK_PUBLIC_CHANNEL_ID: {{ .Values.backend.env.slackPublicChannelId | quote }}
  SLACK_ADMIN_CHANNEL_ID: {{ .Values.backend.env.slackAdminChannelId | quote }}
  {{- if .Values.backend.env.appNow }}
  APP_NOW: {{ .Values.backend.env.appNow | quote }}
  {{- end }}
