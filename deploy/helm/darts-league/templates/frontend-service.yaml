apiVersion: v1
kind: Service
metadata:
  name: {{ include "darts-league.frontendName" . }}
  labels:
    {{- include "darts-league.frontendLabels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "darts-league.frontendSelectorLabels" . | nindent 4 }}
