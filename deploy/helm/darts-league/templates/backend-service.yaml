apiVersion: v1
kind: Service
metadata:
  name: {{ include "darts-league.backendName" . }}
  labels:
    {{- include "darts-league.backendLabels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "darts-league.backendSelectorLabels" . | nindent 4 }}
