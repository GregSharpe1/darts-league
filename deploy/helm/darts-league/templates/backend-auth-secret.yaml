{{- if not .Values.backend.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "darts-league.backendAuthSecretName" . }}
  labels:
    {{- include "darts-league.backendLabels" . | nindent 4 }}
type: Opaque
stringData:
  ADMIN_USERNAME: {{ .Values.backend.auth.username | quote }}
  ADMIN_PASSWORD: {{ .Values.backend.auth.password | quote }}
  ADMIN_SESSION_SECRET: {{ .Values.backend.auth.sessionSecret | quote }}
{{- end }}
